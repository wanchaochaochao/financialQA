# ==========================================
# 金融资产问答系统 - Nginx 配置
# ==========================================
#
# 功能说明：
# 1. 监听 80 端口，接收所有 HTTP 请求
# 2. 将 /api/* 请求代理到 Python FastAPI 后端 (localhost:9000)
# 3. 将其他所有请求代理到 Next.js 前端 (localhost:3000)
#
# 使用方法：
# 1. 复制此文件到 /etc/nginx/sites-available/financial-qa
# 2. 创建软链接：sudo ln -s /etc/nginx/sites-available/financial-qa /etc/nginx/sites-enabled/
# 3. 测试配置：sudo nginx -t
# 4. 重启 Nginx：sudo systemctl restart nginx
# ==========================================

upstream nextjs_frontend {
    server localhost:3000;
    keepalive 64;
}

upstream python_backend {
    server localhost:9000;
    keepalive 64;
}

server {
    listen 80;
    server_name _;  # 修改为你的域名，如：api.yourdomain.com

    # 客户端最大请求体大小（用于上传文件）
    client_max_body_size 50M;

    # 访问日志
    access_log /var/log/nginx/financial-qa-access.log;
    error_log /var/log/nginx/financial-qa-error.log;

    # ==========================================
    # Next.js API Routes (登录、注册等)
    # ==========================================
    location /api/ {
        proxy_pass http://nextjs_frontend;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ==========================================
    # Python FastAPI 后端 (AI 聊天)
    # /py-api/* → localhost:9000/api/*
    # ==========================================
    location /py-api/ {
        # 去掉 /py-api 前缀，转发 /api/* 到 Python 后端
        rewrite ^/py-api/(.*) /$1 break;
        proxy_pass http://python_backend;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # AI 响应超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        proxy_buffering off;
        proxy_cache off;
    }

    # ==========================================
    # Next.js 前端代理
    # ==========================================
    location / {
        proxy_pass http://nextjs_frontend;

        # 代理请求头
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 支持（Next.js HMR）
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 超时设置
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # ==========================================
    # Next.js 静态资源优化
    # ==========================================
    location /_next/static {
        proxy_pass http://nextjs_frontend;
        proxy_cache_valid 200 60m;
        add_header Cache-Control "public, max-age=3600, immutable";
    }

    # ==========================================
    # Favicon 和静态文件
    # ==========================================
    location ~* \.(ico|css|js|gif|jpeg|jpg|png|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://nextjs_frontend;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ==========================================
    # 健康检查端点
    # ==========================================
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}

# ==========================================
# HTTPS 配置（可选，需要 SSL 证书）
# ==========================================
# 如果需要启用 HTTPS，取消以下注释并配置证书路径
#
# server {
#     listen 443 ssl http2;
#     server_name your-domain.com;
#
#     ssl_certificate /path/to/your/certificate.crt;
#     ssl_certificate_key /path/to/your/private.key;
#
#     ssl_protocols TLSv1.2 TLSv1.3;
#     ssl_ciphers HIGH:!aNULL:!MD5;
#     ssl_prefer_server_ciphers on;
#
#     # 其他配置与上面的 HTTP server 块相同
#     # ...
# }
#
